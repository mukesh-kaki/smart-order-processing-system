spring:
  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: order-service

app:
  kafka:
    topics:
      mappings:
        OrderCreatedEvent: order-created-events
        InventoryReservedEvent: inventory-reserved-events
        PaymentRequestedEvent: payment-requested-events
        PaymentCompletedEvent: payment-completed-events