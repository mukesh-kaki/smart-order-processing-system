server:
  port: 8080

spring:

  datasource:
    url: jdbc:postgresql://postgres:5432/inventorydb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: kafka:9092

    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest

    producer:
      acks: all